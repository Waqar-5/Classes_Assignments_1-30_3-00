<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pratice</title>
    <style>

        body{
        margin-top: 70px;
        text-align: center;
        background-color: moccasin;
        }
        #main-div{
            border: 5px dashed green;
            background-color: white;
        }

        .div1{
            padding: 10px;
            margin: 10px;
            background-color: rgb(236, 96, 120);
            border: 5px solid black;
            width: 200px;
            height: 200px;
        }
         .div2{
            padding: 20px;
            margin: 30px;
            background-color: rgb(236, 96, 120);
            border: 5px solid black;
            width: 200px;
            height: 200px;
        }
         .div3{
            padding: 40px;
            margin: 5px;
            background-color: rgb(236, 96, 120);
            border: 5px solid black;
            width: 200px;
            height: 200px;
        }
         .div4{
            padding:  10px 30px 50px 5px;
            /* margin:  top 40px, left 60px; */
            margin: 40px 0 0 60px;
            background-color: rgb(236, 96, 120);
            border: 5px solid black;
            width: 200px;
            height: 200px;
        }

         .div5{
            padding: 10px 20px 30px 40px;
            margin: 50px 10px;
            background-color: rgb(236, 96, 120);
            border: 5px solid black;
            width: 200px;
            height: 200px;
        }
             .div6{
            padding: 10px 20px 30px 40px;
            margin: 50px 10px;
            background-color: rgb(236, 96, 120);
            border: 5px solid black;
            width: 200px;
            height: 200px;
        }
    </style>
</head>
<body>
    
    <header>
        <h1>CSS Margin and Padding Demonstration</h1>

        <div id="main-div">

            <div class="div1">
                padding: 10px
                <br>
                margin: 10px
            </div>

             <div class="div2">
                padding: 20px
                <br>
                margin: 30px
            </div>

             <div class="div3">
                padding: 40px
                <br>
                margin: 5px
            </div>

            <div class="div4">
                padding: 10px 30px 50px 5px
                <br>
                margin: top 40px, left 60px
            </div>

            <div class="div5">
                padding: 10px 20px 30px 40px
                <br>
                margin: 50px 10px
            </div>

            <div class="div6">
                padding: 5px
                <br>
                margin: 80px
            </div>
            
        </div>

    </header>

</body>
</html>
